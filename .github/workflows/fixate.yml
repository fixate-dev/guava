name: Run Test with Agent

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"

      - name: Download agent jars from GitHub Packages
        env:
          AGENT_VERSION: "${{ vars.FIXATE_AGENT_VERSION }}"
        run: |
          if [ -z "$AGENT_VERSION" ]; then
            echo "::error::FIXATE_AGENT_VERSION is not set"
            exit 1
          fi

          curl -fu "${{ github.repository_owner }}:${{ secrets.FIXATE_PACKAGES_ACCESS_TOKEN }}" \
            -L "https://maven.pkg.github.com/fixate-dev/Fixate/com/example/fixate-agent/${AGENT_VERSION}/fixate-agent-${AGENT_VERSION}.jar" \
            -o fixate-agent.jar

          curl -fu "${{ github.repository_owner }}:${{ secrets.FIXATE_PACKAGES_ACCESS_TOKEN }}" \
            -fL "https://maven.pkg.github.com/fixate-dev/Fixate/com/example/fixate-agent/${AGENT_VERSION}/fixate-agent-${AGENT_VERSION}-bootstrap.jar" \
            -o fixate-agent-bootstrap.jar

      - name: Install guava module to local repository
        run: ./mvnw install -pl guava -DskipTests

      - name: Run tests with agent
        env:
          MAVEN_OPTS: "-javaagent:./fixate-agent.jar -Xmx16g"
        run: ./mvnw test -pl guava-testlib -DargLine="-Dfixate.depth=0"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./reports/
